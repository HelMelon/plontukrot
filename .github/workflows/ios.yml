name: iOS Flutter Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable

      - name: Install dependencies
        # Этот шаг сгенерирует файлы для Xcode под капотом
        run: flutter pub get

      - name: Install CocoaPods
          # Оставляем только установку утилиты, если она нужна.
        # Переходить в папку ios и вызывать pod install вручную НЕ нужно.
        run: sudo gem install cocoapods

      - name: Build iOS (no codesign)
        # Команда сборки сама запустит pod install в правильный момент
        run: flutter build ios --debug --no-codesign
