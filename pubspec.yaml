name: plontukrot
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: '>=3.5.4 <4.0.0' # Разрешает сборку на любой современной версии Dart 3.x

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase экосистема обновлена до взаимно совместимых версий
  firebase_core: ^3.10.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0

  # Остальные пакеты обновлены под стабильный Dart 3.5.4+
  flutter_slidable: ^3.1.1
  cached_network_image: ^3.4.1
  google_sign_in: ^6.2.2

  image_picker: ^1.1.2
  auto_size_text: ^3.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^4.0.0 # Версия 4.0.0 идеально работает с Dart 3.5.4+

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app-icon.png"
  adaptive_icon_background: "#FF1E261E"
  adaptive_icon_foreground: "assets/images/app-icon.png"
